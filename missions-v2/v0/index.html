<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Draftea — Misiones (Prototipo UX)</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #0D0D1A; font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; overflow-x: hidden; }
    #root { min-height: 100vh; display: flex; justify-content: center; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── Design Tokens ───
const T = {
  bg: '#0D0D1A', card: '#1A1A2E', card2: '#231E3C',
  purple: '#4B20FF', violet: '#9730FF', green: '#4AE291',
  gold: '#FFDE4E', white: '#FBFBFB', grey: '#78788C',
  red: '#FF6A5C', surface: '#141428',
  gradient: 'linear-gradient(135deg, #4B20FF, #9730FF)',
  gradientGold: 'linear-gradient(135deg, #FFDE4E, #FFB347)',
};

// ─── Mission Data (Spanish) ───
const MISSIONS = [
  { id: 'm1', name: 'Haz tu primera apuesta', xp: 25, category: 'start', icon: '🎯', desc: 'Apuesta dinero real en cualquier evento deportivo.', tutorial: 'Abre la pestaña OSB, busca un partido, toca cualquier momio, ingresa tu apuesta y confirma.', ctaLabel: 'Ir a OSB', ctaTarget: 'osb' },
  { id: 'm2', name: 'Arma una parlay de 3+ picks', xp: 50, category: 'level-up', icon: '🔗', desc: 'Combina 3 o más selecciones en un solo ticket con momios válidos.', tutorial: 'Toca varios momios de uno o varios partidos. Cada selección es un "pick" de tu parlay. Necesitas 3+ picks con momios de 1.30x o más cada uno.', ctaLabel: 'Armar Parlay', ctaTarget: 'betslip' },
  { id: 'm3', name: 'Apuesta en vivo', xp: 50, category: 'level-up', icon: '⚡', desc: 'Apuesta mientras el partido está en juego. Momios mínimos 1.5x y el ticket debe cerrarse (sin cashout).', tutorial: 'Busca partidos con la etiqueta EN VIVO. Los momios se actualizan en tiempo real. Toca cualquier momio en vivo y confirma.', ctaLabel: 'Ver Partidos en Vivo', ctaTarget: 'osb-live' },
  { id: 'm4', name: 'Usa un beneficio promocional', xp: 75, category: 'explore', icon: '🎁', desc: 'Usa tu primer booster, free bet o free spins de tus beneficios disponibles.', tutorial: 'Ve a tus beneficios en Mi Perfil. Elige uno y sigue las instrucciones para usarlo en tu próxima apuesta o sesión de casino.', ctaLabel: 'Ver beneficios', ctaTarget: 'benefits' },
  { id: 'm5', name: 'Prueba un juego de casino', xp: 75, category: 'explore', icon: '🎰', desc: 'Juega al menos $20 MXN en cualquier juego de casino (slots, crash, mesas).', tutorial: 'Toca la pestaña de iGaming. Explora categorías como Slots, Crash o Mesas en Vivo. Elige un juego y juega con saldo real.', ctaLabel: 'Abrir Casino', ctaTarget: 'igaming' },
  { id: 'm6', name: 'Cierra apuesta con ganancia', xp: 50, category: 'level-up', icon: '💰', desc: 'Usa Cerrar Apuesta en un ticket en vivo para asegurar tu ganancia. Multiplicador mínimo 1.5x.', tutorial: 'Cuando tienes un ticket en vivo ganando, aparece el botón "Cerrar apuesta". Tócalo para llevarte la ganancia antes de que termine el partido.', ctaLabel: 'Ver Mis Tickets', ctaTarget: 'entries' },
  { id: 'm7', name: 'Verifica tu identidad (KYC)', xp: 75, category: 'withdrawals', icon: '🛡️', desc: 'Completa tu KYC. Paso 1 de 2 para desbloquear retiros instantáneos.', tutorial: 'Ve a Mi Perfil > Validar Identidad. Sube tu INE y una selfie. Una vez verificado, tu cuenta está lista para registrar tu CLABE.', ctaLabel: 'Verificar ahora', ctaTarget: 'kyc', groupId: 'instant-withdrawals', groupOrder: 1 },
  { id: 'm8', name: 'Configura tu cuenta CLABE', xp: 50, category: 'withdrawals', icon: '🏦', desc: 'Registra tu CLABE interbancaria. Paso 2 de 2 para desbloquear retiros instantáneos.', tutorial: 'Ve a Mi Perfil > Métodos de retiro > Agregar CLABE. Escribe los 18 dígitos de tu cuenta bancaria (SPEI). Tu CLABE queda vinculada y lista para retirar.', ctaLabel: 'Agregar CLABE', ctaTarget: 'clabe', groupId: 'instant-withdrawals', groupOrder: 2 },
];

const WEEKLY_MISSIONS = [
  { id: 'r1', name: 'Apuesta 3 días diferentes', xp: 0, icon: '📅', progress: 0, target: 3 },
  { id: 'r2', name: 'Arma una parlay de 4+ picks', xp: 0, icon: '🔗', progress: 0, target: 1 },
  { id: 'r3', name: 'Apuesta en un nuevo deporte', xp: 0, icon: '🏈', progress: 0, target: 1 },
  { id: 'r4', name: 'Juega en casino', xp: 0, icon: '🎰', progress: 0, target: 1 },
  { id: 'r5', name: 'Comparte un ticket', xp: 0, icon: '📤', progress: 0, target: 1 },
];

const CATEGORIES = {
  start: { label: 'Empezar', color: '#58C7FF' },
  'level-up': { label: 'Subir de nivel', color: T.violet },
  explore: { label: 'Explorar', color: T.green },
  withdrawals: { label: 'Retiros instantáneos', color: T.gold, subtitle: 'Completa ambas para retirar al instante' },
};

const TOTAL_XP_AVAILABLE = MISSIONS.reduce((s, m) => s + m.xp, 0);
const TOTAL_MISSIONS = MISSIONS.length;

// ─── Shared Components ───

function PhoneFrame({ children, title, onBack }) {
  return (
    <div style={{ width: '100%', maxWidth: 390, minHeight: '100vh', background: T.bg, position: 'relative', overflow: 'hidden' }}>
      {/* Status bar */}
      <div style={{ height: 44, background: T.bg }} />
      {/* Header */}
      <div style={{ height: 52, display: 'flex', alignItems: 'center', padding: '0 16px', gap: 12 }}>
        {onBack && <button onClick={onBack} style={{ background: 'none', border: 'none', color: T.white, fontSize: 20, cursor: 'pointer', padding: '4px 8px' }}>←</button>}
        <span style={{ color: T.white, fontSize: 17, fontWeight: 700 }}>{title}</span>
      </div>
      <div style={{ padding: '0 0 100px 0', overflowY: 'auto', height: 'calc(100vh - 96px)' }}>
        {children}
      </div>
    </div>
  );
}

function XpBar({ current, max, label, animate }) {
  const pct = Math.min((current / max) * 100, 100);
  return (
    <div style={{ padding: '0 16px', marginBottom: 16 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
        <span style={{ color: T.white, fontSize: 12, fontWeight: 600 }}>{current.toLocaleString()} XP</span>
        <span style={{ color: T.grey, fontSize: 12 }}>{label || `${max.toLocaleString()} to next`}</span>
      </div>
      <div style={{ height: 6, borderRadius: 3, background: '#282840', overflow: 'hidden' }}>
        <div style={{
          height: '100%', borderRadius: 3, background: T.gradient,
          width: `${pct}%`,
          transition: animate ? 'width 0.8s cubic-bezier(0.4,0,0.2,1)' : 'none',
        }} />
      </div>
    </div>
  );
}

function TierBadge({ level, name, small }) {
  const s = small ? 40 : 56;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: small ? 4 : 8 }}>
      <div style={{
        width: s, height: s, borderRadius: '50%', background: T.gradient,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        border: `2px solid ${T.violet}`, fontSize: small ? 14 : 18, fontWeight: 800, color: T.white,
      }}>{level}</div>
      {name && <span style={{ color: T.violet, fontSize: small ? 10 : 13, fontWeight: 700, letterSpacing: 1.5, textTransform: 'uppercase' }}>{name}</span>}
    </div>
  );
}

function LootBox({ onClaim, visible }) {
  if (!visible) return null;
  return (
    <div style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', zIndex: 100,
      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      padding: 32, animation: 'fadeIn 0.3s ease',
    }}>
      <style>{`
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes bounceIn { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.05); } 70% { transform: scale(0.95); } 100% { transform: scale(1); opacity: 1; } }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
      `}</style>
      <div style={{ animation: 'bounceIn 0.6s ease', textAlign: 'center' }}>
        <div style={{
          width: 100, height: 100, borderRadius: 20, background: T.gradientGold,
          margin: '0 auto 24px', display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 48, animation: 'float 2s ease-in-out infinite',
          boxShadow: `0 0 40px ${T.gold}44`,
        }}>🎁</div>
        <h2 style={{ color: T.gold, fontSize: 22, fontWeight: 800, letterSpacing: 1, marginBottom: 8 }}>¡MISIONES COMPLETAS!</h2>
        <p style={{ color: T.white, opacity: 0.7, fontSize: 14, marginBottom: 8 }}>Completaste todas las misiones de onboarding.</p>
        <div style={{
          background: `${T.green}20`, borderRadius: 20, padding: '8px 20px',
          display: 'inline-block', marginBottom: 32,
        }}>
          <span style={{ color: T.green, fontWeight: 700, fontSize: 15 }}>+{TOTAL_XP_AVAILABLE} XP ganados</span>
        </div>
        <br />
        <button onClick={onClaim} style={{
          background: T.gradient, border: 'none', borderRadius: 12, color: T.white,
          fontSize: 16, fontWeight: 700, padding: '16px 48px', cursor: 'pointer', width: '100%', maxWidth: 300,
        }}>Abrir Cofre</button>
      </div>
    </div>
  );
}

function MissionDetailSheet({ mission, onClose, onComplete }) {
  if (!mission) return null;
  const [showTutorial, setShowTutorial] = useState(false);
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 90, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end' }}>
      <div onClick={onClose} style={{ flex: 1, background: 'rgba(0,0,0,0.5)' }} />
      <div style={{
        background: T.card, borderRadius: '20px 20px 0 0', padding: '20px 20px 36px',
        animation: 'slideUp 0.3s ease',
      }}>
        <style>{`@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }`}</style>
        <div style={{ width: 36, height: 4, borderRadius: 2, background: '#ffffff30', margin: '0 auto 20px' }} />
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
          <div style={{ width: 48, height: 48, borderRadius: 12, background: T.card2, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24 }}>{mission.icon}</div>
          <div style={{ flex: 1 }}>
            <h3 style={{ color: T.white, fontSize: 16, fontWeight: 700, marginBottom: 2 }}>{mission.name}</h3>
            <span style={{ color: T.violet, fontSize: 13, fontWeight: 600 }}>+{mission.xp} XP</span>
          </div>
        </div>
        <p style={{ color: T.white, opacity: 0.7, fontSize: 14, lineHeight: 1.5, marginBottom: 16 }}>{mission.desc}</p>

        {!showTutorial ? (
          <button onClick={() => setShowTutorial(true)} style={{
            background: `${T.violet}15`, border: `1px solid ${T.violet}40`, borderRadius: 10,
            padding: '12px 16px', width: '100%', textAlign: 'left', cursor: 'pointer', marginBottom: 16,
            display: 'flex', alignItems: 'center', gap: 10,
          }}>
            <span style={{ fontSize: 18 }}>📖</span>
            <span style={{ color: T.violet, fontSize: 13, fontWeight: 600 }}>¿Cómo funciona?</span>
          </button>
        ) : (
          <div style={{
            background: `${T.violet}10`, border: `1px solid ${T.violet}25`, borderRadius: 10,
            padding: 16, marginBottom: 16, animation: 'fadeIn 0.3s ease',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
              <span style={{ fontSize: 14 }}>📖</span>
              <span style={{ color: T.violet, fontSize: 12, fontWeight: 700, letterSpacing: 0.5 }}>MINI GUÍA</span>
            </div>
            <p style={{ color: T.white, opacity: 0.8, fontSize: 13, lineHeight: 1.5 }}>{mission.tutorial}</p>
          </div>
        )}

        <div style={{ display: 'flex', gap: 10 }}>
          <button onClick={onComplete} style={{
            flex: 1, background: T.gradient, border: 'none', borderRadius: 12,
            color: T.white, fontSize: 15, fontWeight: 700, padding: '14px 0', cursor: 'pointer',
          }}>Completar (Demo)</button>
          <button onClick={onClose} style={{
            background: 'transparent', border: `1.5px solid ${T.white}30`, borderRadius: 12,
            color: T.white, opacity: 0.7, fontSize: 14, fontWeight: 600, padding: '14px 20px', cursor: 'pointer',
          }}>{mission.ctaLabel}</button>
        </div>
      </div>
    </div>
  );
}

function CompletionToast({ mission, visible }) {
  if (!visible) return null;
  return (
    <div style={{
      position: 'fixed', top: 60, left: '50%', transform: 'translateX(-50%)',
      background: T.green, borderRadius: 12, padding: '12px 20px', zIndex: 80,
      display: 'flex', alignItems: 'center', gap: 10, animation: 'bounceIn 0.4s ease',
      boxShadow: `0 8px 24px ${T.green}40`,
    }}>
      <span style={{ fontSize: 18 }}>✓</span>
      <span style={{ color: '#0D0D1A', fontWeight: 700, fontSize: 14 }}>{mission?.name} +{mission?.xp} XP</span>
    </div>
  );
}

// ─── Tab Bar Component ───
function TabBar({ active, onChange, rewardsCount }) {
  return (
    <div style={{ display: 'flex', gap: 0, padding: '0 16px', marginBottom: 12 }}>
      {[{ id: 'missions', label: 'Misiones' }, { id: 'rewards', label: 'Recompensas' }].map(({ id, label }) => (
        <button key={id} onClick={() => onChange(id)} style={{
          flex: 1, padding: '10px 0', border: 'none', cursor: 'pointer',
          background: 'transparent',
          borderBottom: `2px solid ${active === id ? T.violet : 'transparent'}`,
          color: active === id ? T.white : T.grey,
          fontSize: 14, fontWeight: 600, position: 'relative',
        }}>
          {label}
          {id === 'rewards' && rewardsCount > 0 && (
            <span style={{
              position: 'absolute', top: 4, right: 20, width: 18, height: 18, borderRadius: 9,
              background: T.violet, color: T.white, fontSize: 10, fontWeight: 700,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>{rewardsCount}</span>
          )}
        </button>
      ))}
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ALTERNATIVE A — Mission Queue (Progressive Reveal)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function AltA({ onBack }) {
  const [completed, setCompleted] = useState([]);
  const [selectedMission, setSelectedMission] = useState(null);
  const [toast, setToast] = useState(null);
  const [showLoot, setShowLoot] = useState(false);
  const [tab, setTab] = useState('missions');
  const [phase, setPhase] = useState('onboarding'); // onboarding | recurring

  const remaining = MISSIONS.filter(m => !completed.includes(m.id));
  const visible = remaining.slice(0, 3);
  const completedCount = completed.length;
  const totalXp = completed.reduce((sum, id) => sum + MISSIONS.find(m => m.id === id).xp, 0);

  const completeMission = (mission) => {
    setSelectedMission(null);
    setCompleted(prev => [...prev, mission.id]);
    setToast(mission);
    setTimeout(() => setToast(null), 2000);
    if (completed.length + 1 >= MISSIONS.length) {
      setTimeout(() => setShowLoot(true), 800);
    }
  };

  return (
    <PhoneFrame title="Mi perfil" onBack={onBack}>
      <div style={{ padding: '0 16px 12px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
        <TierBadge level={0} name="Rookie" />
      </div>
      <XpBar current={125 + totalXp} max={500} label="500 XP para Tier 1" animate />

      <TabBar active={tab} onChange={setTab} rewardsCount={phase === 'recurring' ? 1 : 0} />

      {tab === 'missions' && phase === 'onboarding' && (
        <div style={{ padding: '0 16px' }}>
          {/* Counter */}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
            <span style={{ color: T.white, fontSize: 13, fontWeight: 700, letterSpacing: 0.8 }}>TUS PRIMEROS PASOS</span>
            <span style={{ color: T.violet, fontSize: 13, fontWeight: 700 }}>{completedCount}/{TOTAL_MISSIONS}</span>
          </div>

          {/* Visible mission cards (max 3) */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {visible.map((m, i) => (
              <div key={m.id} onClick={() => setSelectedMission(m)} style={{
                background: T.card, borderRadius: 14, padding: 16, cursor: 'pointer',
                display: 'flex', alignItems: 'center', gap: 14,
                border: i === 0 ? `1px solid ${T.violet}40` : '1px solid transparent',
                animation: `fadeIn 0.3s ease ${i * 0.1}s both`,
                transition: 'transform 0.2s, box-shadow 0.2s',
              }}
                onMouseEnter={e => { e.currentTarget.style.transform = 'scale(1.01)'; e.currentTarget.style.boxShadow = `0 4px 20px ${T.violet}20`; }}
                onMouseLeave={e => { e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.boxShadow = 'none'; }}
              >
                <div style={{ width: 44, height: 44, borderRadius: 12, background: T.card2, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22, flexShrink: 0 }}>{m.icon}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ color: T.white, fontSize: 14, fontWeight: 600, marginBottom: 2 }}>{m.name}</div>
                  <div style={{ color: T.grey, fontSize: 12 }}>{CATEGORIES[m.category]?.label}</div>
                </div>
                <div style={{ color: T.violet, fontSize: 14, fontWeight: 700, flexShrink: 0 }}>+{m.xp}</div>
              </div>
            ))}
          </div>

          {/* See all link */}
          {remaining.length > 3 && (
            <div style={{ textAlign: 'center', marginTop: 12 }}>
              <span style={{ color: T.grey, fontSize: 12 }}>{remaining.length - 3} misiones más por delante</span>
            </div>
          )}

          {/* Completed list */}
          {completedCount > 0 && (
            <div style={{ marginTop: 20 }}>
              <span style={{ color: T.grey, fontSize: 12, fontWeight: 600 }}>COMPLETADAS</span>
              {MISSIONS.filter(m => completed.includes(m.id)).map(m => (
                <div key={m.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 0', opacity: 0.5 }}>
                  <div style={{ width: 20, height: 20, borderRadius: 10, background: T.green, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, color: '#0D0D1A' }}>✓</div>
                  <span style={{ color: T.white, fontSize: 13 }}>{m.name}</span>
                  <span style={{ color: T.green, fontSize: 12, marginLeft: 'auto' }}>+{m.xp}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {tab === 'rewards' && (
        <div style={{ padding: '0 16px', textAlign: 'center', paddingTop: 40 }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>🔒</div>
          <p style={{ color: T.grey, fontSize: 14 }}>Completa misiones para desbloquear recompensas</p>
        </div>
      )}

      <MissionDetailSheet mission={selectedMission} onClose={() => setSelectedMission(null)} onComplete={() => completeMission(selectedMission)} />
      <CompletionToast mission={toast} visible={!!toast} />
      <LootBox visible={showLoot} onClaim={() => { setShowLoot(false); setPhase('recurring'); }} />
    </PhoneFrame>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ALTERNATIVE B — Hero Mission (Refined: no dup bar)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function AltB({ onBack }) {
  const [completed, setCompleted] = useState([]);
  const [toast, setToast] = useState(null);
  const [showLoot, setShowLoot] = useState(false);
  const [previewIdx, setPreviewIdx] = useState(null);
  const [tab, setTab] = useState('missions');

  const remaining = MISSIONS.filter(m => !completed.includes(m.id));
  const currentIdx = previewIdx !== null ? previewIdx : MISSIONS.findIndex(m => !completed.includes(m.id));
  const currentMission = MISSIONS[currentIdx];
  const completedCount = completed.length;
  const totalXp = completed.reduce((sum, id) => sum + MISSIONS.find(m => m.id === id).xp, 0);
  const allDone = completedCount >= MISSIONS.length;

  const completeMission = () => {
    if (!currentMission || completed.includes(currentMission.id)) return;
    setCompleted(prev => [...prev, currentMission.id]);
    setToast(currentMission);
    setPreviewIdx(null);
    setTimeout(() => setToast(null), 2000);
    if (completed.length + 1 >= MISSIONS.length) {
      setTimeout(() => setShowLoot(true), 800);
    }
  };

  return (
    <PhoneFrame title="Mi perfil" onBack={onBack}>
      <div style={{ padding: '0 16px 12px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
        <TierBadge level={0} name="Rookie" />
      </div>
      <XpBar current={125 + totalXp} max={500} label="500 XP para Tier 1" animate />

      <TabBar active={tab} onChange={setTab} rewardsCount={0} />

      {tab === 'missions' && !allDone && currentMission && (
        <div style={{ padding: '0 16px' }}>
          {/* Hero mission card */}
          <div style={{
            background: T.card, borderRadius: 16, padding: 20, marginBottom: 16,
            border: `1px solid ${T.violet}30`,
            boxShadow: `0 8px 32px ${T.violet}15`,
          }}>
            {/* Top row: icon + counter */}
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 }}>
              <div style={{ width: 56, height: 56, borderRadius: 16, background: T.gradient, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 28 }}>{currentMission.icon}</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                {MISSIONS.map((m, i) => (
                  <div key={m.id} style={{
                    width: 8, height: 8, borderRadius: 4,
                    background: completed.includes(m.id) ? T.green : i === currentIdx ? T.violet : '#ffffff20',
                    transition: 'all 0.3s',
                  }} />
                ))}
                <span style={{ color: T.grey, fontSize: 11, fontWeight: 600, marginLeft: 6 }}>{completedCount}/{TOTAL_MISSIONS}</span>
              </div>
            </div>

            {/* Mission content */}
            <div style={{ color: CATEGORIES[currentMission.category]?.color, fontSize: 11, fontWeight: 600, letterSpacing: 0.5, marginBottom: 6 }}>{CATEGORIES[currentMission.category]?.label?.toUpperCase()}</div>
            <h3 style={{ color: T.white, fontSize: 18, fontWeight: 700, marginBottom: 6 }}>{currentMission.name}</h3>
            <p style={{ color: T.white, opacity: 0.6, fontSize: 13, lineHeight: 1.5, marginBottom: 16 }}>{currentMission.desc}</p>

            {/* XP reward */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 20 }}>
              <div style={{ background: `${T.violet}20`, borderRadius: 8, padding: '6px 12px' }}>
                <span style={{ color: T.violet, fontSize: 15, fontWeight: 700 }}>+{currentMission.xp} XP</span>
              </div>
            </div>

            {/* CTAs */}
            {!completed.includes(currentMission.id) ? (
              <div style={{ display: 'flex', gap: 10 }}>
                <button onClick={completeMission} style={{ flex: 1, background: T.gradient, border: 'none', borderRadius: 12, color: T.white, fontSize: 15, fontWeight: 700, padding: '14px 0', cursor: 'pointer' }}>
                  Completar (Demo)
                </button>
                <button style={{ background: T.card2, border: 'none', borderRadius: 12, color: T.white, fontSize: 13, fontWeight: 600, padding: '14px 16px', cursor: 'pointer', opacity: 0.8 }}>
                  {currentMission.ctaLabel}
                </button>
              </div>
            ) : (
              <div style={{ background: `${T.green}15`, borderRadius: 12, padding: 14, textAlign: 'center' }}>
                <span style={{ color: T.green, fontWeight: 700, fontSize: 14 }}>✓ Completada</span>
              </div>
            )}
          </div>

          {/* Mission strip (tappable) */}
          <div style={{ display: 'flex', gap: 6, overflowX: 'auto', paddingBottom: 8, WebkitOverflowScrolling: 'touch' }}>
            {MISSIONS.map((m, i) => {
              const isDone = completed.includes(m.id);
              const isCurrent = i === currentIdx;
              return (
                <button key={m.id} onClick={() => setPreviewIdx(i)} style={{
                  flexShrink: 0, width: 44, height: 44, borderRadius: 12,
                  background: isDone ? `${T.green}20` : isCurrent ? T.card2 : T.card,
                  border: isCurrent ? `2px solid ${T.violet}` : isDone ? `1px solid ${T.green}40` : '1px solid #ffffff10',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: isDone ? 14 : 18, cursor: 'pointer',
                  color: isDone ? T.green : T.white,
                }}>
                  {isDone ? '✓' : m.icon}
                </button>
              );
            })}
          </div>
        </div>
      )}

      {tab === 'missions' && allDone && (
        <div style={{ padding: '40px 16px', textAlign: 'center' }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>🎉</div>
          <h3 style={{ color: T.white, fontSize: 18, fontWeight: 700, marginBottom: 8 }}>¡Todas las misiones completas!</h3>
          <p style={{ color: T.grey, fontSize: 14 }}>Las misiones semanales arrancan el próximo lunes.</p>
        </div>
      )}

      {tab === 'rewards' && (
        <div style={{ padding: '40px 16px', textAlign: 'center' }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>🔒</div>
          <p style={{ color: T.grey, fontSize: 14 }}>Completa misiones para desbloquear recompensas</p>
        </div>
      )}

      <CompletionToast mission={toast} visible={!!toast} />
      <LootBox visible={showLoot} onClaim={() => setShowLoot(false)} />
    </PhoneFrame>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ALTERNATIVE C — Quest Board (Category Grid)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function AltC({ onBack }) {
  const [completed, setCompleted] = useState([]);
  const [selectedMission, setSelectedMission] = useState(null);
  const [toast, setToast] = useState(null);
  const [showLoot, setShowLoot] = useState(false);
  const [tab, setTab] = useState('missions');

  const completedCount = completed.length;
  const totalXp = completed.reduce((sum, id) => sum + MISSIONS.find(m => m.id === id).xp, 0);
  const groups = {};
  MISSIONS.forEach(m => { if (!groups[m.category]) groups[m.category] = []; groups[m.category].push(m); });

  const completeMission = (mission) => {
    setSelectedMission(null);
    setCompleted(prev => [...prev, mission.id]);
    setToast(mission);
    setTimeout(() => setToast(null), 2000);
    if (completed.length + 1 >= MISSIONS.length) {
      setTimeout(() => setShowLoot(true), 800);
    }
  };

  // Find first incomplete mission for "recommended" highlight
  const recommended = MISSIONS.find(m => !completed.includes(m.id));

  return (
    <PhoneFrame title="Mi perfil" onBack={onBack}>
      <div style={{ padding: '0 16px 12px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
        <TierBadge level={0} name="Rookie" />
      </div>
      <XpBar current={125 + totalXp} max={500} label="500 XP para Tier 1" animate />

      {/* Mission progress bar */}
      <div style={{ padding: '0 16px', marginBottom: 4 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
          <span style={{ color: T.white, fontSize: 12, fontWeight: 600 }}>Misiones</span>
          <span style={{ color: T.violet, fontSize: 12, fontWeight: 700 }}>{completedCount}/{TOTAL_MISSIONS}</span>
        </div>
        <div style={{ height: 4, borderRadius: 2, background: '#282840', overflow: 'hidden' }}>
          <div style={{ height: '100%', borderRadius: 2, background: T.gradient, width: `${(completedCount / TOTAL_MISSIONS) * 100}%`, transition: 'width 0.5s ease' }} />
        </div>
      </div>

      <TabBar active={tab} onChange={setTab} rewardsCount={0} />

      {tab === 'missions' && (
        <div style={{ padding: '0 16px' }}>
          {Object.entries(groups).map(([cat, missions]) => {
            const isGrouped = cat === 'withdrawals';
            const groupDone = missions.filter(m => completed.includes(m.id)).length;
            const catColor = CATEGORIES[cat]?.color;
            return (
              <div key={cat} style={{
                marginBottom: 20,
                ...(isGrouped ? {
                  background: `${catColor}0D`,
                  border: `1px solid ${catColor}33`,
                  borderRadius: 16,
                  padding: 14,
                } : {}),
              }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: isGrouped ? 4 : 10 }}>
                  <div style={{ width: 4, height: 16, borderRadius: 2, background: catColor }} />
                  <span style={{ color: catColor, fontSize: 12, fontWeight: 700, letterSpacing: 0.5 }}>{CATEGORIES[cat]?.label?.toUpperCase()}</span>
                  {isGrouped && (
                    <span style={{ marginLeft: 'auto', color: catColor, fontSize: 11, fontWeight: 700, background: `${catColor}1A`, borderRadius: 10, padding: '2px 8px' }}>
                      {groupDone}/{missions.length}
                    </span>
                  )}
                </div>
                {isGrouped && CATEGORIES[cat]?.subtitle && (
                  <div style={{ color: T.white, opacity: 0.55, fontSize: 11, marginLeft: 12, marginBottom: 12, fontStyle: 'italic' }}>
                    🔒 {CATEGORIES[cat].subtitle}
                  </div>
                )}
                <div style={{
                  display: 'grid',
                  gridTemplateColumns: '1fr 1fr',
                  gap: 10,
                  position: 'relative',
                }}>
                  {isGrouped && (
                    <div style={{
                      position: 'absolute',
                      top: '50%', left: '50%',
                      transform: 'translate(-50%, -50%)',
                      width: 22, height: 22, borderRadius: 11,
                      background: T.card2,
                      border: `1.5px dashed ${catColor}88`,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      color: catColor, fontSize: 12, fontWeight: 800, zIndex: 2,
                      pointerEvents: 'none',
                    }}>+</div>
                  )}
                  {missions.map(m => {
                    const isDone = completed.includes(m.id);
                    const isRec = recommended?.id === m.id;
                    const accent = isGrouped ? catColor : T.violet;
                    return (
                      <button key={m.id} onClick={() => !isDone && setSelectedMission(m)} style={{
                        background: isDone ? `${T.green}10` : T.card,
                        borderRadius: 14, padding: 16,
                        border: isRec ? `1.5px solid ${accent}` : isDone ? `1px solid ${T.green}30` : isGrouped ? `1px solid ${catColor}22` : '1px solid transparent',
                        cursor: isDone ? 'default' : 'pointer', textAlign: 'center',
                        position: 'relative', transition: 'transform 0.15s',
                      }}
                        onMouseEnter={e => !isDone && (e.currentTarget.style.transform = 'scale(1.02)')}
                        onMouseLeave={e => (e.currentTarget.style.transform = 'scale(1)')}
                      >
                        {isRec && !isDone && (
                          <div style={{
                            position: 'absolute', top: -8, left: '50%', transform: 'translateX(-50%)',
                            background: accent, borderRadius: 6, padding: '2px 8px',
                            fontSize: 9, fontWeight: 700, color: isGrouped ? '#0D0D1A' : T.white, letterSpacing: 0.5, whiteSpace: 'nowrap',
                          }}>EMPIEZA AQUÍ</div>
                        )}
                        {isGrouped && m.groupOrder && (
                          <div style={{
                            position: 'absolute', top: 8, right: 8,
                            background: `${catColor}1F`, color: catColor,
                            borderRadius: 6, padding: '2px 6px',
                            fontSize: 9, fontWeight: 700, letterSpacing: 0.3,
                          }}>PASO {m.groupOrder}</div>
                        )}
                        <div style={{ fontSize: 28, marginBottom: 8 }}>{isDone ? '✓' : m.icon}</div>
                        <div style={{
                          color: isDone ? T.green : T.white, fontSize: 12, fontWeight: 600,
                          opacity: isDone ? 0.6 : 1, lineHeight: 1.3,
                        }}>{m.name}</div>
                        <div style={{
                          color: isDone ? T.green : accent, fontSize: 12, fontWeight: 700, marginTop: 6,
                        }}>{isDone ? 'Hecha' : `+${m.xp} XP`}</div>
                      </button>
                    );
                  })}
                </div>
                {isGrouped && groupDone === missions.length && (
                  <div style={{
                    marginTop: 10, padding: '8px 12px', borderRadius: 10,
                    background: `${T.green}18`, color: T.green,
                    fontSize: 12, fontWeight: 700, textAlign: 'center',
                  }}>
                    ✓ Retiros instantáneos desbloqueados
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {tab === 'rewards' && (
        <div style={{ padding: '40px 16px', textAlign: 'center' }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>🔒</div>
          <p style={{ color: T.grey, fontSize: 14 }}>Completa misiones para desbloquear recompensas</p>
        </div>
      )}

      <MissionDetailSheet mission={selectedMission} onClose={() => setSelectedMission(null)} onComplete={() => completeMission(selectedMission)} />
      <CompletionToast mission={toast} visible={!!toast} />
      <LootBox visible={showLoot} onClaim={() => setShowLoot(false)} />
    </PhoneFrame>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ALTERNATIVE A+B — Hybrid (Hero + Queue + Onboardinho)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function AltAB({ onBack }) {
  const [completed, setCompleted] = useState([]);
  const [selectedMission, setSelectedMission] = useState(null);
  const [toast, setToast] = useState(null);
  const [showLoot, setShowLoot] = useState(false);
  const [tab, setTab] = useState('missions');

  const remaining = MISSIONS.filter(m => !completed.includes(m.id));
  const heroMission = remaining[0];
  const upNext = remaining.slice(1, 3);
  const completedCount = completed.length;
  const totalXp = completed.reduce((sum, id) => sum + MISSIONS.find(m => m.id === id).xp, 0);
  const allDone = completedCount >= MISSIONS.length;

  const completeMission = (mission) => {
    setSelectedMission(null);
    setCompleted(prev => [...prev, mission.id]);
    setToast(mission);
    setTimeout(() => setToast(null), 2000);
    if (completed.length + 1 >= MISSIONS.length) {
      setTimeout(() => setShowLoot(true), 800);
    }
  };

  return (
    <PhoneFrame title="Mi perfil" onBack={onBack}>
      <div style={{ padding: '0 16px 12px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
        <TierBadge level={0} name="Rookie" />
      </div>
      <XpBar current={125 + totalXp} max={500} label="500 XP para Tier 1" animate />

      <TabBar active={tab} onChange={setTab} rewardsCount={0} />

      {tab === 'missions' && !allDone && heroMission && (
        <div style={{ padding: '0 16px' }}>
          {/* Hero card (tappable for detail sheet) */}
          <div onClick={() => setSelectedMission(heroMission)} style={{
            background: T.card, borderRadius: 16, padding: 20, marginBottom: 12, cursor: 'pointer',
            border: `1px solid ${T.violet}30`, boxShadow: `0 8px 32px ${T.violet}12`,
            position: 'relative', overflow: 'hidden',
          }}>
            {/* Subtle gradient accent on left */}
            <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 4, background: T.gradient, borderRadius: '16px 0 0 16px' }} />

            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 14 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <div style={{ width: 48, height: 48, borderRadius: 14, background: T.gradient, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24 }}>{heroMission.icon}</div>
                <div>
                  <div style={{ color: CATEGORIES[heroMission.category]?.color, fontSize: 11, fontWeight: 600, letterSpacing: 0.5, marginBottom: 2 }}>{CATEGORIES[heroMission.category]?.label?.toUpperCase()}</div>
                  <h3 style={{ color: T.white, fontSize: 16, fontWeight: 700 }}>{heroMission.name}</h3>
                </div>
              </div>
              <div style={{ background: `${T.violet}20`, borderRadius: 8, padding: '5px 10px', flexShrink: 0 }}>
                <span style={{ color: T.violet, fontSize: 14, fontWeight: 700 }}>+{heroMission.xp}</span>
              </div>
            </div>

            <p style={{ color: T.white, opacity: 0.55, fontSize: 13, lineHeight: 1.4, marginBottom: 16 }}>{heroMission.desc}</p>

            <div style={{ display: 'flex', gap: 10 }}>
              <button onClick={(e) => { e.stopPropagation(); completeMission(heroMission); }} style={{ flex: 1, background: T.gradient, border: 'none', borderRadius: 11, color: T.white, fontSize: 14, fontWeight: 700, padding: '12px 0', cursor: 'pointer' }}>
                Completar (Demo)
              </button>
              <button onClick={(e) => { e.stopPropagation(); setSelectedMission(heroMission); }} style={{ background: T.card2, border: 'none', borderRadius: 11, color: T.white, fontSize: 12, fontWeight: 600, padding: '12px 14px', cursor: 'pointer', opacity: 0.8 }}>
                How?
              </button>
            </div>

            {/* Mission counter dots inside card */}
            <div style={{ display: 'flex', justifyContent: 'center', gap: 4, marginTop: 14 }}>
              {MISSIONS.map(m => (
                <div key={m.id} style={{
                  width: 6, height: 6, borderRadius: 3,
                  background: completed.includes(m.id) ? T.green : m.id === heroMission.id ? T.violet : '#ffffff20',
                }} />
              ))}
            </div>
          </div>

          {/* Up next queue */}
          {upNext.length > 0 && (
            <>
              <span style={{ color: T.grey, fontSize: 11, fontWeight: 600, letterSpacing: 0.5, padding: '4px 0', display: 'block' }}>SIGUEN</span>
              {upNext.map((m, i) => (
                <div key={m.id} onClick={() => setSelectedMission(m)} style={{
                  background: T.card, borderRadius: 12, padding: '12px 14px', marginTop: 8, cursor: 'pointer',
                  display: 'flex', alignItems: 'center', gap: 12, opacity: 0.65,
                  transition: 'opacity 0.2s',
                }}
                  onMouseEnter={e => e.currentTarget.style.opacity = '0.85'}
                  onMouseLeave={e => e.currentTarget.style.opacity = '0.65'}
                >
                  <div style={{ width: 36, height: 36, borderRadius: 10, background: T.card2, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, flexShrink: 0 }}>{m.icon}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ color: T.white, fontSize: 13, fontWeight: 600 }}>{m.name}</div>
                    <div style={{ color: T.grey, fontSize: 11 }}>{CATEGORIES[m.category]?.label}</div>
                  </div>
                  <span style={{ color: T.violet, fontSize: 13, fontWeight: 600 }}>+{m.xp}</span>
                </div>
              ))}
              {remaining.length > 3 && (
                <div style={{ textAlign: 'center', marginTop: 10 }}>
                  <span style={{ color: T.grey, fontSize: 11 }}>{remaining.length - 3} más después</span>
                </div>
              )}
            </>
          )}

          {/* Completed */}
          {completedCount > 0 && (
            <div style={{ marginTop: 20 }}>
              <span style={{ color: T.grey, fontSize: 11, fontWeight: 600, letterSpacing: 0.5 }}>COMPLETADAS</span>
              {MISSIONS.filter(m => completed.includes(m.id)).map(m => (
                <div key={m.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 0', opacity: 0.4 }}>
                  <div style={{ width: 18, height: 18, borderRadius: 9, background: T.green, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, color: '#0D0D1A', fontWeight: 800 }}>✓</div>
                  <span style={{ color: T.white, fontSize: 12 }}>{m.name}</span>
                  <span style={{ color: T.green, fontSize: 11, marginLeft: 'auto' }}>+{m.xp}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {tab === 'missions' && allDone && (
        <div style={{ padding: '40px 16px', textAlign: 'center' }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>🎉</div>
          <h3 style={{ color: T.white, fontSize: 18, fontWeight: 700, marginBottom: 8 }}>¡Todas las misiones completas!</h3>
          <p style={{ color: T.grey, fontSize: 14 }}>Las misiones semanales arrancan el próximo lunes.</p>
        </div>
      )}

      {tab === 'rewards' && (
        <div style={{ padding: '40px 16px', textAlign: 'center' }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>🔒</div>
          <p style={{ color: T.grey, fontSize: 14 }}>Completa misiones para desbloquear recompensas</p>
        </div>
      )}

      <MissionDetailSheet mission={selectedMission} onClose={() => setSelectedMission(null)} onComplete={() => completeMission(selectedMission)} />
      <CompletionToast mission={toast} visible={!!toast} />
      <LootBox visible={showLoot} onClaim={() => setShowLoot(false)} />
    </PhoneFrame>
  );
}

                <span style={{ color: a.color, fontSize: 13, fontWeight: 700 }}>{a.score}/100</span>
              </div>
              <p style={{ color: T.grey, fontSize: 12, lineHeight: 1.4 }}>{a.subtitle}</p>
            </div>
          </button>
        ))}
      </div>
      <div style={{ padding: '20px 16px', textAlign: 'center' }}>
        <p style={{ color: T.grey, fontSize: 11 }}>Draftea — Misiones de Loyalty — Prototipo UX v2 — Abril 2026</p>
      </div>
    </PhoneFrame>
  );
}

function App() {
  const [view, setView] = useState('home');
  const goHome = () => setView('home');

  switch (view) {
    case 'a': return <AltA onBack={goHome} />;
    case 'b': return <AltB onBack={goHome} />;
    case 'c': return <AltC onBack={goHome} />;
    case 'ab': return <AltAB onBack={goHome} />;
    default: return <Home onSelect={setView} />;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
